<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphones</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .headphone-section {
            padding: 60px 10%;
            text-align: center;
        }

        .headphone-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .headphone-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            position: relative;
        }

        .headphone-box:hover {
            transform: translateY(-10px);
        }

        .headphone-box img {
            width: 180px;
            height: 150px;
        }

        .price {
            color: green;
            font-weight: bold;
            margin: 10px 0;
        }

        .cart-btn {
            padding: 8px 15px;
            background: orange;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-btn:hover {
            background: red;
        }

        /* wishlist heart */

        .heart {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            cursor: pointer;
            color: #bbb;
        }

        .heart:hover {
            color: red;
        }

        .wish-btn {
            padding: 8px 15px;
            background: #ff4081;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .wish-btn:hover {
            background: #e91e63;
        }
    </style>

</head>

<body>

    <section class="headphone-section">

        <h2>Headphones</h2>

        <div class="headphone-container">

            <div class="headphone-box">

                <img src="Sony WH-1000XM4.jpg">
                <h3>Sony WH-1000XM4</h3>
                <p class="price">₹25000</p>
                <button onclick="addToCart('Sony WH-1000XM4',25000)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Sony WH-1000XM4',25000,'sony WH-1000XM4.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="boat_headphone.jpg">
                <h3>Boat Rockerz 550</h3>
                <p class="price">₹2000</p>
                <button onclick="addToCart('Boat Rockerz 550',2000)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Boat Rockerz 550',2000,'boat_headphone.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="JBL Tune 760NC.jpg">
                <h3>JBL Tune 760NC</h3>
                <p class="price">₹6000</p>
                <button onclick="addToCart('JBL Tune 760NC',6000)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('JBL Tune 760NC',6000,'JBL Tune 760NC.jfif')" class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="boat_headphone.jpg">
                <h3>Beats Studio 3</h3>
                <p class="price">₹30000</p>
                <button onclick="addToCart('Beats Studio 3',30000)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Beats Studio 3',30000,'boat_headphone.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="Sony WH-1000XM4.jpg">
                <h3>Sony WH-CH720N</h3>
                <p class="price">₹10000</p>
                <button onclick="addToCart('Sony WH-CH720N',10000)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Sony WH-CH720N',10000,'Sony WH-1000XM4.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="Boat Rockerz 450.jpg">
                <h3>Boat Rockerz 450</h3>
                <p class="price">₹1500</p>
                <button onclick="addToCart('Boat Rockerz 450',1500)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Boat Rockerz 450',1500,'Boat Rockerz 450.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="Noise Two Wireless.jpg">
                <h3>Noise Two Wireless</h3>
                <p class="price">₹1800</p>
                <button onclick="addToCart('Noise Two Wireless',1800)" class="cart-btn">Add to Cart</button>
                <button onclick="addToWishlist('Noise Two Wireless',1800,'Noise Two Wireless.jfif')"
                    class="wish-btn">❤</button>
            </div>

            <div class="headphone-box">
                <img src="Skullcandy Hesh Evo.jpg">
                <h3>Skullcandy Hesh Evo</h3>

            </div>

        </div>

        <br><br>

        <a href="electronics.html" class="cart-btn">⬅ Back to Home</a>

    </section>

    <script>

        function addToCart(name, price) {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push({ name: name, price: price });

            localStorage.setItem("cart", JSON.stringify(cart));

            alert(name + " added to cart");

        }

        function addToWishlist(name, price, image) {

            let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

            wishlist.push({
                name: name,
                price: price,
                image: image
            });

            localStorage.setItem("wishlist", JSON.stringify(wishlist));

            alert(name + " added to wishlist ❤️");

        }

    </script>

</body>

</html>
